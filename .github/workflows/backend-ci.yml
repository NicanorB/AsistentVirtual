name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      llama-embedding:
        image: python:3.12-slim
        ports:
          - "8080:8080"
        options: >-
          --health-cmd "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          -v ${{ github.workspace }}/.github/mock-embedding-service:/app
          --entrypoint sh
        args: >-
          -c "pip install --no-cache-dir fastapi uvicorn[standard] &&
          uvicorn main:app --host 0.0.0.0 --port 8080 --app-dir /app"

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432
      EMBEDDINGS_HOST: http://localhost:8080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Run backend tests
        run: cargo test --all-targets --locked
