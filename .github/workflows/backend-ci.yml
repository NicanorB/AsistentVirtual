name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432
      EMBEDDINGS_HOST: http://localhost:8080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Start mock embeddings API
        run: |
          python -m venv .venv-embeddings
          . .venv-embeddings/bin/activate
          pip install --no-cache-dir fastapi uvicorn[standard]
          nohup uvicorn main:app --host 0.0.0.0 --port 8080 --app-dir ../.github/mock-embedding-service >/tmp/mock-embeddings.log 2>&1 &
          sleep 5
          curl http://localhost:8080/health

      - name: Run backend tests
        run: cargo test --all-targets --locked
