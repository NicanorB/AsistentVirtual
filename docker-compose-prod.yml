services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
      POSTGRES_DB:
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
