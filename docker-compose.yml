# Run the development build

services:
  frontend:
    image: node:latest
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  db:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    environment:
      POSTGRES_PASSWORD: password

  backend:
    image: rust:latest
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    command: sh -c "cargo install cargo-watch && cargo watch -x run"
    environment:
      JWT_ACCESS_SECRET: dev_access_secret
      JWT_REFRESH_SECRET: dev_refresh_secret
      DATABASE_URL: postgres://postgres:password@db:5432/postgres
      DOCUMENTS_DIR: /tmp/documents
      EMBEDDINGS_HOST: http://llama_embedding:8080
      COMPLETIONS_HOST: http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"

  llama_embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - "--embeddings"
      - "--hf-repo"
      - "enacimie/Qwen3-Embedding-0.6B-Q4_K_M-GGUF"
      - "--hf-file"
      - "qwen3-embedding-0.6b-q4_k_m.gguf"
      - "-c"
      - "2048"
